# IR4 Nginx TLS vhost (DOC-20). Place under /etc/nginx/sites-available/ir4
# Replace CHANGE_ME_* CIDRs and certificate paths before enable.

upstream ir4_php {
    server unix:/run/php/php8.4-fpm.sock;
}

upstream ir4_reverb {
    server 127.0.0.1:8080;
}

# Operator / display subnet (surface A)
geo $ir4_operator_net {
    default 0;
    CHANGE_ME_OPERATOR_CIDR 1;   # e.g. 10.10.0.0/24
}

# Device subnet (surface B)
geo $ir4_device_net {
    default 0;
    CHANGE_ME_DEVICE_CIDR 1;     # e.g. 10.20.0.0/24
}

# Any internal LAN (surface C public QR)
geo $ir4_lan {
    default 0;
    CHANGE_ME_OPERATOR_CIDR 1;
    CHANGE_ME_DEVICE_CIDR 1;
    CHANGE_ME_GENERAL_LAN_CIDR 1; # e.g. 10.0.0.0/8
}

server {
    listen 443 ssl http2;
    server_name ir4.site.local;

    root /var/www/ir4/public;
    index index.php;

    ssl_certificate     /etc/ssl/ir4/ir4.crt;
    ssl_certificate_key /etc/ssl/ir4/ir4.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 64m;
    client_body_timeout 120s;

    # Reverb WebSocket
    location /app {
        if ($ir4_lan = 0) { return 403; }
        proxy_pass http://ir4_reverb;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # Surface B — device ingest + heartbeats
    location ^~ /api/ingest {
        if ($ir4_device_net = 0) { return 403; }
        try_files $uri $uri/ /index.php?$query_string;
    }
    location ^~ /api/devices {
        if ($ir4_device_net = 0) { return 403; }
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Surface C — public equipment QR (LAN only)
    location ^~ /e/ {
        if ($ir4_lan = 0) { return 403; }
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Health probes (LAN)
    location = /up {
        if ($ir4_lan = 0) { return 403; }
        try_files $uri /index.php?$query_string;
    }

    # Operator UI + authenticated APIs (surface A)
    location / {
        if ($ir4_operator_net = 0) { return 403; }
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass ir4_php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

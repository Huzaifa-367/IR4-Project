#!/usr/sbin/nft -f
# IR4 host firewall (DOC-20). Replace CHANGE_ME_* CIDRs.
# Policy: default deny inbound; default deny outbound except DHCP/NTP/LAN services.

flush ruleset

table inet filter {
    set operator_net {
        type ipv4_addr
        flags interval
        elements = { CHANGE_ME_OPERATOR_CIDR }
    }

    set device_net {
        type ipv4_addr
        flags interval
        elements = { CHANGE_ME_DEVICE_CIDR }
    }

    set lan_net {
        type ipv4_addr
        flags interval
        elements = { CHANGE_ME_OPERATOR_CIDR, CHANGE_ME_DEVICE_CIDR, CHANGE_ME_GENERAL_LAN_CIDR }
    }

    chain input {
        type filter hook input priority filter; policy drop;
        ct state established,related accept
        iif "lo" accept
        ip protocol icmp accept
        tcp dport 22 ip saddr @operator_net accept
        tcp dport { 80, 443 } ip saddr @lan_net accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy drop;
        ct state established,related accept
        oif "lo" accept
        ip protocol icmp accept
        # NTP + DHCP on LAN / local resolvers only — no general internet egress
        udp dport 123 ip daddr @lan_net accept
        udp dport 53 ip daddr { 127.0.0.1, CHANGE_ME_LOCAL_DNS } accept
        tcp dport 53 ip daddr { 127.0.0.1, CHANGE_ME_LOCAL_DNS } accept
        # Local MySQL / Redis / printer
        tcp dport { 3306, 6379, 9100 } ip daddr { 127.0.0.1, CHANGE_ME_PRINTER_IP } accept
    }
}
